<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudPulse Interactive Date Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

  <div class="container">

    <header>
      <h1>CloudPulse Interactive Date Dashboard</h1>

      <button id="themeToggle">
        Toggle Theme
      </button>
    </header>

    <section class="hero">
      <h2>Interactive Date Utility Platform</h2>
      <p>
        Calculate day, week, countdown, date difference,
        future dates and more.
      </p>
    </section>

    <section class="date-section">

      <div class="input-card">

        <h3>Select Date</h3>

        <input type="date" id="dateInput"/>

        <div class="button-group">
          <button onclick="calculateDateInfo()">
            Calculate
          </button>

          <button onclick="clearResults()">
            Clear
          </button>
        </div>

      </div>

    </section>

    <section class="results-grid">

      <div class="card">
        <h3>Day</h3>
        <p id="dayResult">--</p>
      </div>

      <div class="card">
        <h3>Week Number</h3>
        <p id="weekResult">--</p>
      </div>

      <div class="card">
        <h3>Day Of Year</h3>
        <p id="dayYearResult">--</p>
      </div>

      <div class="card">
        <h3>Days Remaining</h3>
        <p id="remainingResult">--</p>
      </div>

      <div class="card">
        <h3>+30 Days</h3>
        <p id="plus30Result">--</p>
      </div>

      <div class="card">
        <h3>-30 Days</h3>
        <p id="minus30Result">--</p>
      </div>

      <div class="card">
        <h3>Difference From Today</h3>
        <p id="differenceResult">--</p>
      </div>

      <div class="card">
        <h3>Leap Year</h3>
        <p id="leapResult">--</p>
      </div>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
