version: '3.9'

services:

  cloudpulse:

    image: thehkj04/cloudpulse:v2

    container_name: cloudpulse-container

    ports:
      - "30080:80"

    restart: always

  prometheus:

    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9091:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:

    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    restart: always

  node-exporter:

    image: prom/node-exporter

    container_name: node-exporter

    ports:
      - "9100:9100"

    restart: always

  cadvisor:

    image: gcr.io/cadvisor/cadvisor:latest

    container_name: cadvisor

    privileged: true

    ports:
      - "8081:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

    restart: always

  nginx-exporter:

    image: nginx/nginx-prometheus-exporter

    container_name: nginx-exporter

    command:
      - -nginx.scrape-uri=http://cloudpulse/nginx_status

    ports:
      - "9113:9113"

    restart: always