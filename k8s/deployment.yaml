apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse
  namespace: cloudpulse

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudpulse

  template:
    metadata:
      labels:
        app: cloudpulse

    spec:
      containers:
      - name: cloudpulse

        image: thehkj04/cloudpulse:v2

        ports:
        - containerPort: 80