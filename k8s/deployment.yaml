apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse
  namespace: cloudpulse

spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudpulse
  template:
    metadata:
      labels:
        app: cloudpulse
    spec:
      containers:
      - name: cloudpulse
        image: thehkj04/cloudpulse:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
